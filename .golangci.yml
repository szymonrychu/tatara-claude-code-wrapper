version: "2"

run:
  timeout: 5m
  tests: true

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/szymonrychu/tatara-claude-code-wrapper

linters:
  default: none
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unconvert
    - unused

  settings:
    revive:
      rules:
        - name: exported
          disabled: true
    gosec:
      # G301/G304/G306 are expected in bootstrap (config file rendering) and tests.
      # Non-test files suppress inline; test files suppress here to avoid noisy annotations.
      excludes:
        - G301
        - G304
        - G306
