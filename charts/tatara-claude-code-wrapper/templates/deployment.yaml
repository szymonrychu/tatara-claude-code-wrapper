apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tatara-claude-code-wrapper.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tatara-claude-code-wrapper.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tatara-claude-code-wrapper.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tatara-claude-code-wrapper.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "tatara-claude-code-wrapper.serviceAccountName" . }}
      containers:
        - name: wrapper
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "tatara-claude-code-wrapper.fullname" . }}
            - secretRef:
                name: {{ default (include "tatara-claude-code-wrapper.fullname" .) .Values.existingSecret }}
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.anthropicApiKeySecret }}
                  key: {{ .Values.anthropicApiKeyKey }}
            # pod label for pushed metrics (downward API); the wrapper falls
            # back to its hostname when unset.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: files
              mountPath: /etc/wrapper
            - name: workspace
              mountPath: /workspace
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: files
          configMap:
            name: {{ include "tatara-claude-code-wrapper.fullname" . }}-files
            items:
              - key: global-claude.md
                path: global-claude.md
              - key: project-claude.md
                path: project-claude.md
              - key: mcp-base.json
                path: mcp-base.json
              - key: allowed-tools.txt
                path: allowed-tools.txt
              {{- range $name, $server := .Values.extraMcpServers }}
              - key: "mcp.d__{{ $name }}.json"
                path: "mcp.d/{{ $name }}.json"
              {{- end }}
        - name: workspace
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "tatara-claude-code-wrapper.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
