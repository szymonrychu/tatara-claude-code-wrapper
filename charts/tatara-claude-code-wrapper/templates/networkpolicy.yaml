{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tatara-claude-code-wrapper.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tatara-claude-code-wrapper.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "tatara-claude-code-wrapper.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ default .Release.Namespace .Values.networkPolicy.callerNamespace }}
      ports:
        - port: 8080
          protocol: TCP
    # Allow Prometheus scrape of /metrics from any namespace (monitoring ns is
    # cluster-specific; open ingress on http port matches tatara-chat pattern).
    - ports:
        - port: http
          protocol: TCP
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - namespaceSelector: {}
      ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
{{- end }}
