{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tatara-claude-code-wrapper.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tatara-claude-code-wrapper.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "tatara-claude-code-wrapper.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ default .Release.Namespace .Values.networkPolicy.callerNamespace }}
      ports:
        - port: 8080
          protocol: TCP
    {{- if .Values.networkPolicy.monitoringNamespace }}
    # Allow Prometheus scrape of /metrics from the monitoring namespace only.
    # /metrics shares the public API port (8080), so a from-less rule here would
    # open the control API cluster-wide; restrict it to the monitoring ns instead.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace }}
      ports:
        - port: http
          protocol: TCP
    {{- end }}
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - namespaceSelector: {}
      ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
{{- end }}
