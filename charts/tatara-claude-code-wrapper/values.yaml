image:
  repository: harbor.szymonrichert.pl/containers/tatara-claude-code-wrapper
  tag: ""
  pullPolicy: IfNotPresent
# imagePullSecrets are cluster-specific; the deploying helmfile supplies them.
imagePullSecrets: []
replicaCount: 1

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

httpAddr: ":8080"
internalAddr: "127.0.0.1:8090"
oidcIssuer: ""
oidcAudience: "tatara-claude-code-wrapper"
logLevel: "info"
model: ""
permissionMode: "bypassPermissions"
repoUrl: ""
repoBranch: ""
defaultCallbackUrl: ""
turnTimeoutSeconds: 1800
# Total pod lifetime budget in seconds. The operator sets this per Project; the
# wrapper refuses to start an ordinary turn past it. 0 disables the bound.
agentPodTTLSeconds: 3600
bootTimeoutSeconds: 60
webhookRetries: 3

# file-shaped inputs rendered into the files ConfigMap, mounted at /etc/wrapper
globalClaudeMd: ""
projectClaudeMd: ""
allowedTools: []
extraMcpServers: {}
baseMcp: |
  {"mcpServers":{}}

# secrets via external Secret (sops); set existingSecret to override
existingSecret: ""
anthropicApiKeySecret: "tatara-claude-code-wrapper"
anthropicApiKeyKey: "anthropic-api-key"

service:
  type: ClusterIP
  port: 8080

serviceMonitor:
  enabled: true
  interval: "30s"
  scrapeTimeout: "10s"

networkPolicy:
  enabled: true
  callerNamespace: ""
  # Namespace Prometheus scrapes /metrics from. Cluster-specific, so the
  # helmfile sets it (kubernetes.io/metadata.name label match). Empty disables
  # the scrape ingress rule rather than opening the API port cluster-wide.
  monitoringNamespace: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 1Gi

persistence:
  enabled: false
  size: 5Gi
  # storageClass is cluster-specific; empty uses the cluster default, or the
  # deploying helmfile sets it explicitly.
  storageClass: ""
