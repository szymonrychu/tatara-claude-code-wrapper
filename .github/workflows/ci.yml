name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    uses: szymonrychu/tatara-operator/.github/workflows/ci-shared.yml@main
    with:
      runner-label: tatara-claude-code-wrapper
      smoke-binary: ./bin/wrapper
      has-chart: true
      image-build-arg: TATARA_CLI_VERSION=7e62585
    secrets: inherit
