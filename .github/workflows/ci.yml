name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  secscan:
    runs-on: tatara-claude-code-wrapper
    steps:
      - uses: actions/checkout@v4
      - name: gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" \
            | tar -xzf - gitleaks
          ./gitleaks detect --source . --no-git --redact --verbose

  lint:
    runs-on: tatara-claude-code-wrapper
    steps:
      - uses: actions/checkout@v4
      - name: build tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential
      - uses: jdx/mise-action@v2
        with:
          cache: true
      - run: pre-commit run --all-files

  test:
    runs-on: tatara-claude-code-wrapper
    steps:
      - uses: actions/checkout@v4
      - name: build tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential
      - uses: jdx/mise-action@v2
        with:
          cache: true
      - run: mise run test

  build:
    runs-on: tatara-claude-code-wrapper
    needs: [secscan, lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: build tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential
      - uses: jdx/mise-action@v2
        with:
          cache: true
      - run: mise run build

  smoke:
    runs-on: tatara-claude-code-wrapper
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: build tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential
      - uses: jdx/mise-action@v2
        with:
          cache: true
      - name: smoke
        run: |
          mise run build
          ./bin/wrapper --help || true

# NOTE: image + chart publish is NOT here. On a green push-to-main run, the
# `release` workflow (workflow_run gated on this `ci` run) cuts the semver tag,
# then builds+pushes the image and chart at that bare X.Y.Z version. The legacy
# per-push `image`/`chart` jobs (which double-built the image every merge and
# published the 0.0.0-g<sha> chart scheme) are removed in favour of that single
# semver-versioned publish path.
